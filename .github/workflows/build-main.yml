name: Build Main

# Triggered by every push to main (i.e., after a PR is merged).
# ─ checks : same quality gate as in PR — fails fast if something slipped through
# ─ docker : builds the image, pushes to ACR, deploys to Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual run from GitHub Actions UI

permissions:
  contents: read
  actions: write   # needed to delete old artifacts

jobs:
  # ── 1. Quality gate (same as PR) ─────────────────────────────────────────
  checks:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vite build (client)
        run: npm run build

      - name: TypeScript check (server)
        run: npm run build:server

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  # ── 2. Build, push to ACR, deploy to Container Apps ──────────────────────
  docker:
    name: Build & Deploy
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image to ACR
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/tg-news-reader:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/tg-news-reader:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure ACR credentials on Container App
        run: |
          az containerapp registry set \
            --name ${{ secrets.AZURE_CONTAINER_APP }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Deploy to Container Apps
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/tg-news-reader:${{ github.sha }} \
            --revision-suffix "r${SHORT_SHA}"

      # ── Single-revision mode: deactivate all revisions except the new one ──
      # Container Apps keeps old revisions by default — they consume quota.
      # "Single" mode means only one active revision at a time.
      - name: Set single-revision mode
        run: |
          az containerapp revision set-mode \
            --name ${{ secrets.AZURE_CONTAINER_APP }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --mode Single

      # ── Purge old ACR images — keep only the 5 most recent tags ──────────
      # ACR Basic = 10 GB limit; without cleanup images accumulate forever.
      # 'acr purge' runs as an ACR Task (no extra auth needed).
      - name: Purge old ACR images (keep 5)
        run: |
          az acr run \
            --registry ${{ secrets.ACR_LOGIN_SERVER }} \
            --cmd "acr purge --filter 'tg-news-reader:.*' --keep 5 --ago 0d --untagged" \
            /dev/null

      - name: Export image archive (artifact backup)
        run: |
          docker save ${{ secrets.ACR_LOGIN_SERVER }}/tg-news-reader:${{ github.sha }} | gzip > tg-news-reader.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.sha }}
          path: tg-news-reader.tar.gz
          retention-days: 90

      # ── Keep only 3 latest docker-image-* artifacts ──────────────────────
      - name: Cleanup old artifacts (keep 3)
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const images = data.artifacts
              .filter(a => a.name.startsWith('docker-image-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = images.slice(3);
            for (const artifact of toDelete) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted: ${artifact.name} (created ${artifact.created_at})`);
            }
            console.log(`Kept: ${Math.min(images.length, 3)}, deleted: ${toDelete.length}`);
